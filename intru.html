<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu de l'intrus</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FFF9F0;
  --card-bg: #ffffff;
  --text: #2d2416;
  --muted: #7a6a55;
  --accent: #FF6B35;
  --accent2: #4ECDC4;
  --accent3: #FFD166;
  --green: #2ecc71;
  --red: #e74c3c;
  --radius: 20px;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  padding: 32px 20px 80px;
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(255,107,53,0.07) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(78,205,196,0.07) 0%, transparent 50%);
}

/* ===== TOP BAR ===== */
.top-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  max-width: 900px;
  margin: 0 auto 36px;
}

.back-btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50px;
  padding: 9px 18px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  color: rgba(255,255,255,0.7);
  transition: transform 0.15s, background 0.15s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.back-btn:hover { transform: scale(1.04); background: rgba(255,255,255,0.13); }

.page-title {
  font-family: 'Baloo 2', cursive;
  font-size: clamp(1.4rem, 4vw, 1.9rem);
  font-weight: 800;
  color: var(--text);
  flex: 1;
}

.page-title span { color: var(--accent); }

/* ===== LEGEND ===== */
.legend {
  max-width: 900px;
  margin: 0 auto 32px;
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
  padding: 14px 20px;
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.9rem;
  color: var(--muted);
  font-weight: 600;
}

/* ===== PLAQUETTES STACK ===== */
.plaquettes-list {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

/* ===== ONE PLAQUETTE ===== */
.plaquette-wrap {
  animation: slide-in 0.4s ease both;
}

@keyframes slide-in {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.plaquette {
  border-radius: var(--radius);
  padding: 18px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

/* Pastel backgrounds per category theme */
.plaquette.theme-food    { background: #fff5e6; }
.plaquette.theme-school  { background: #e8f4fd; }
.plaquette.theme-winter  { background: #eaf7f5; }
.plaquette.theme-garden  { background: #edf7e6; }
.plaquette.theme-action  { background: #f5eeff; }
.plaquette.theme-texture { background: #fff0f5; }
.plaquette.theme-size    { background: #fdf5e6; }
.plaquette.theme-feeling { background: #e6f0ff; }
.plaquette.theme-story   { background: #fef5e6; }
.plaquette.theme-tool    { background: #f0fff4; }
.plaquette.theme-mixed   { background: #f5f0ff; }

/* ===== IMAGE SLOT ===== */
.img-slot {
  aspect-ratio: 1 / 1;
  border-radius: 13px;
  overflow: hidden;
  background: rgba(255,255,255,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  transition: transform 0.18s, box-shadow 0.18s;
  border: 2px solid transparent;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.img-slot:hover {
  transform: scale(1.06);
  box-shadow: 0 6px 18px rgba(0,0,0,0.16);
}

.img-slot img {
  width: 88%;
  height: 88%;
  object-fit: contain;
  display: block;
  pointer-events: none;
}

.img-slot.img-wide img {
  width: 70%;
  height: 70%;
}

.img-slot .img-name {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.5);
  color: white;
  text-align: center;
  padding: 4px 6px;
  font-size: 0.7rem;
  font-weight: 700;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}
.img-slot:hover .img-name { opacity: 1; }

.img-slot .missing-ph {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 4px;
  color: #aaa;
  font-size: 0.65rem;
  font-weight: 700;
  text-align: center;
  padding: 6px;
  opacity: 0.7;
}
.img-slot .missing-ph span { font-size: 1.4rem; }

/* States after reveal */
.img-slot.is-intru {
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(231,76,60,0.35);
}
.img-slot.is-good {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(46,204,113,0.25);
}
.img-slot.wrong-pick {
  border-color: #f39c12;
  box-shadow: 0 0 0 3px rgba(243,156,18,0.35);
  animation: wobble 0.35s ease;
}

@keyframes wobble {
  0%,100%{ transform: rotate(0deg); }
  25%    { transform: rotate(-4deg); }
  75%    { transform: rotate(4deg); }
}

/* Overlay badge */
.slot-badge {
  position: absolute;
  top: 5px; right: 5px;
  font-size: 1.3rem;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
}
.img-slot.is-intru .slot-badge,
.img-slot.is-good .slot-badge { opacity: 1; }

/* ===== EXPLANATION ===== */
.plaquette-expl {
  margin-top: 10px;
  padding: 10px 16px;
  border-radius: 12px;
  background: rgba(0,0,0,0.06);
  font-size: 0.82rem;
  font-weight: 700;
  color: #555;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  min-height: 36px;
  border-left: 3px solid transparent;
  transition: background 0.3s, border-color 0.3s, color 0.3s;
}

.plaquette-expl .expl-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
.plaquette-expl .expl-text { flex: 1; line-height: 1.5; }

.plaquette-expl.revealed {
  background: rgba(46,204,113,0.12);
  border-color: var(--green);
  color: #1a5c34;
}
.plaquette-expl.wrong-revealed {
  background: rgba(243,156,18,0.12);
  border-color: #f39c12;
  color: #7a4f00;
}

/* ===== THEME BADGE - removed ===== */

/* ===== NUMBER BADGE - removed ===== */

/* ===== SCORE BAR ===== */
.score-bar {
  max-width: 900px;
  margin: 0 auto 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.score-pill {
  background: rgba(255,209,102,0.15);
  border: 1px solid rgba(255,209,102,0.3);
  border-radius: 50px;
  padding: 8px 20px;
  font-family: 'Baloo 2', cursive;
  font-weight: 800;
  font-size: 1rem;
  color: var(--accent3);
}

@media (max-width: 500px) {
  .plaquette { gap: 6px; padding: 12px; }
  .img-slot { border-radius: 9px; }
  body { padding: 20px 12px 60px; }
}

/* ===== BOUTON PDF ===== */
.btn-pdf {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 50px;
  padding: 9px 18px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 3px 10px rgba(255,107,53,0.3);
  transition: transform 0.15s, box-shadow 0.15s;
  white-space: nowrap;
}
.btn-pdf:hover { transform: scale(1.05); box-shadow: 0 5px 16px rgba(255,107,53,0.4); }

/* ===== IMPRESSION ===== */
@media print {
  @page {
    size: A4 portrait;
    margin: 12mm 10mm;
  }

  /* Masquer tout l'UI sauf les plaquettes */
  .top-bar, .legend, .score-bar { display: none !important; }

  body {
    background: white !important;
    background-image: none !important;
    padding: 0 !important;
  }

  .plaquettes-list {
    display: grid !important;
    grid-template-columns: 1fr 1fr;
    gap: 10mm;
    max-width: 100%;
  }

  .plaquette-wrap {
    animation: none !important;
    break-inside: avoid;
    page-break-inside: avoid;
  }

  /* Masquer les explications */
  .plaquette-expl { display: none !important; }

  /* Conserver les fonds pastel des plaquettes */
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  .plaquette {
    padding: 10px;
    gap: 6px;
    border-radius: 12px;
  }

  .img-slot {
    border-radius: 8px;
    box-shadow: none !important;
    border: 1.5px solid rgba(0,0,0,0.08) !important;
  }

  /* Masquer les badges ✅/❌ et les états révélés */
  .slot-badge { display: none !important; }
  .img-slot.is-intru, .img-slot.is-good {
    border-color: rgba(0,0,0,0.08) !important;
    box-shadow: none !important;
  }

  .img-slot .img-name { display: none !important; }
}
</style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="back-btn">← Accueil</a>
  <div class="page-title">Jeu de <span>l'intrus</span> 🔍</div>
  <button class="btn-pdf" onclick="window.print()">🖨️ Imprimer / PDF</button>
</div>

<div class="legend">
  <span>👆</span>
  <span>Clique sur l'image qui ne va pas avec les autres. L'explication apparaît en dessous !</span>
</div>

<div class="score-bar">
  <div class="score-pill">✅ <span id="score-val">0</span> / <span id="score-total">0</span> trouvés</div>
</div>

<div class="plaquettes-list" id="plaquettes-list"></div>

<script>
// ======================================================
// DATA — les séries d'intrus
// Chaque entrée : { theme, bg, items[5], intru (index 0-4), explication }
// items = noms de fichiers (sans .png)
// ======================================================

// emoji = affichage d'un emoji à la place d'une image (pas de fichier PNG)
const SERIES = [
  {
    bg: "garden",
    items: ["marron", "oeuf", "citrouille", "livre"],
    intru: 3,
    expl: "L'intrus est « livre » car marron, oeuf et citrouille peuvent rouler — pas le livre !"
  },
  {
    bg: "food",
    items: ["saladier", "bol", "moule", "emporte-pièce"],
    intru: 3,
    expl: "L'intrus est « emporte-pièce » car saladier, bol et moule sont des récipients — l'emporte-pièce est un outil qui découpe, pas un contenant."
  },
  {
    bg: "food",
    items: ["sucré", "délicieux", "dégoûtant", "balayer"],
    intru: 3,
    expl: "L'intrus est « balayer » car sucré, délicieux et dégoûtant décrivent le goût de quelque chose — balayer est une action, pas un goût."
  },
  {
    bg: "garden",
    items: ["hérisson", "écureuil", "_chat_", "marbré"],
    intru: 3,
    emoji: { "_chat_": "🐱" },
    expl: "L'intrus est « marbré » car hérisson, écureuil et chat sont des animaux — le marbré est un gâteau."
  },
  {
    bg: "food",
    items: ["rouler-étaler", "fouetter", "verser", "levure"],
    intru: 3,
    expl: "L'intrus est « levure » car rouler/étaler, fouetter et verser sont des actions — la levure est un ingrédient."
  },
  {
    bg: "food",
    items: ["oeuf", "chocolat", "épices", "cuillère"],
    intru: 3,
    expl: "L'intrus est « cuillère » car oeuf, chocolat et épices sont des ingrédients — la cuillère est un ustensile."
  },
  {
    bg: "school",
    items: ["banc", "chaise", "table", "ardoise"],
    intru: 3,
    expl: "L'intrus est « ardoise » car banc, chaise et table sont des meubles — l'ardoise est un support d'écriture."
  },
  {
    bg: "school",
    items: ["colle", "miel", "encre", "gland"],
    intru: 3,
    expl: "L'intrus est « gland » car colle, miel et encre sont des liquides ou matières visqueuses — le gland est un fruit du chêne, solide."
  },
  {
    bg: "school",
    items: ["dominos", "perles", "cartes", "poubelle"],
    intru: 3,
    expl: "L'intrus est « poubelle » car dominos, perles et cartes sont des jeux ou matériaux de jeu — la poubelle sert à jeter les déchets."
  },
  {
    bg: "winter",
    items: ["écharpe", "bottes", "gants", "râteau"],
    intru: 3,
    expl: "L'intrus est « râteau » car écharpe, bottes et gants sont des vêtements ou accessoires à porter — le râteau est un outil de jardinage."
  },
  {
    bg: "garden",
    items: ["noix", "noisette", "châtaignes", "frangipane"],
    intru: 3,
    expl: "L'intrus est « frangipane » car noix, noisette et châtaignes sont des fruits à coque que l'on ramasse — la frangipane est une crème pâtissière, un gâteau."
  },
  {
    bg: "garden",
    items: ["cacao", "chocolat", "pomme de pin", "mauve"],
    intru: 3,
    expl: "L'intrus est « mauve » car cacao, chocolat et pomme de pin sont bruns — le mauve est une couleur violette."
  },
  {
    bg: "garden",
    items: ["champ", "potager", "jardin", "dedans"],
    intru: 3,
    expl: "L'intrus est « dedans » car champ, potager et jardin sont des espaces extérieurs — dedans signifie à l'intérieur."
  },
  {
    bg: "winter",
    items: ["venteux", "pluvieux", "ensoleillé", "fromages"],
    intru: 3,
    expl: "L'intrus est « fromages » car venteux, pluvieux et ensoleillé décrivent la météo — les fromages se mangent !"
  },
  {
    bg: "story",
    items: ["vieux-vieille", "bonhomme", "paysan(nes)", "couronne"],
    intru: 3,
    expl: "L'intrus est « couronne » car vieux/vieille, bonhomme et paysan(nes) désignent des personnes vivantes — la couronne est un objet inanimé."
  },
  {
    bg: "winter",
    items: ["citronnier", "oranger", "arbre d'hiver", "feuille d'érable"],
    intru: 3,
    expl: "L'intrus est « feuille d'érable » car citronnier, oranger et arbre d'hiver sont des arbres entiers — la feuille d'érable est juste une feuille, pas un arbre."
  },
  {
    bg: "winter",
    items: ["parapluie", "pleuvoir", "flaque d'eau", "dé"],
    intru: 3,
    expl: "L'intrus est « dé » car parapluie, pleuvoir et flaque d'eau sont tous liés à la pluie — le dé, lui, fait des trous mais seulement dans les cuirs… et ça n'a rien à voir !"
  },
  {
    bg: "action",
    items: ["entourer", "admirer", "se couvrir", "jour"],
    intru: 3,
    expl: "L'intrus est « jour » car entourer, admirer et se couvrir sont des actions — le jour est un moment dans le temps, pas une action."
  },
  {
    bg: "garden",
    items: ["navet", "carotte", "haricots", "sucre"],
    intru: 3,
    expl: "L'intrus est « sucre » car navet, carotte et haricots sont des légumes — le sucre est un ingrédient de cuisine."
  },
  {
    bg: "food",
    items: ["gâteau", "frangipane", "marbré", "navet"],
    intru: 3,
    expl: "L'intrus est « navet » car gâteau, frangipane et marbré sont des pâtisseries — le navet est un légume du potager."
  }
];

// ======================================================
let score = 0;
document.getElementById('score-total').textContent = SERIES.length;

function wordToFile(w) { return w + '.png'; }

function buildPlaquette(serie, idx) {
  const wrap = document.createElement('div');
  wrap.className = 'plaquette-wrap';
  wrap.style.animationDelay = (idx * 0.04) + 's';

  const plate = document.createElement('div');
  plate.className = `plaquette theme-${serie.bg}`;

  let answered = false;
  const emojiMap = serie.emoji || {};

  serie.items.forEach((word, i) => {
    const slot = document.createElement('div');
    slot.className = 'img-slot';
    const wideWords = ['banc', 'table', 'tableau', 'rouleau', 'emporte-pièce', 'écharpe'];
    if (wideWords.includes(word)) slot.classList.add('img-wide');

    if (emojiMap[word]) {
      // Render as big emoji instead of image
      const emojiEl = document.createElement('div');
      emojiEl.style.cssText = 'font-size:4rem;line-height:1;display:flex;align-items:center;justify-content:center;width:100%;height:100%;';
      emojiEl.textContent = emojiMap[word];
      slot.appendChild(emojiEl);
    } else {
      const img = document.createElement('img');
      img.src = wordToFile(word);
      img.alt = word;
      img.loading = 'lazy';
      img.onerror = () => {
        slot.innerHTML = '';
        const ph = document.createElement('div');
        ph.className = 'missing-ph';
        ph.innerHTML = `<span>🖼️</span>${word}`;
        slot.appendChild(ph);
        slot.appendChild(makeBadge(i, serie));
      };
      slot.appendChild(img);
    }

    const nameTag = document.createElement('div');
    nameTag.className = 'img-name';
    nameTag.textContent = emojiMap[word] ? word.replace(/_/g,'') : word;

    const badge2 = makeBadge(i, serie);

    slot.appendChild(nameTag);
    slot.appendChild(badge2);

    slot.addEventListener('click', () => {
      if (answered) return;
      if (i === serie.intru) {
        answered = true;
        score++;
        document.getElementById('score-val').textContent = score;
        plate.querySelectorAll('.img-slot').forEach((s, si) => {
          if (si === serie.intru) { s.classList.add('is-intru'); }
          else { s.classList.add('is-good'); }
        });
        expl.classList.add('revealed');
        expl.querySelector('.expl-icon').textContent = '✅';
        expl.querySelector('.expl-text').textContent = serie.expl;
      } else {
        slot.classList.add('wrong-pick');
        setTimeout(() => slot.classList.remove('wrong-pick'), 400);
        expl.classList.add('wrong-revealed');
        expl.querySelector('.expl-icon').textContent = '❌';
        expl.querySelector('.expl-text').textContent = 'Pas celui-là… essaie encore !';
        setTimeout(() => {
          expl.classList.remove('wrong-revealed');
          expl.querySelector('.expl-icon').textContent = '💡';
          expl.querySelector('.expl-text').textContent = '?';
        }, 1200);
      }
    });

    plate.appendChild(slot);
  });

  wrap.appendChild(plate);

  const expl = document.createElement('div');
  expl.className = 'plaquette-expl';
  expl.innerHTML = `<span class="expl-icon">💡</span><span class="expl-text">?</span>`;
  wrap.appendChild(expl);

  return wrap;
}

function makeBadge(i, serie) {
  const b = document.createElement('div');
  b.className = 'slot-badge';
  b.textContent = (i === serie.intru) ? '❌' : '✅';
  return b;
}

// Build all plaquettes
const list = document.getElementById('plaquettes-list');
SERIES.forEach((s, i) => list.appendChild(buildPlaquette(s, i)));
</script>
</body>
</html>
